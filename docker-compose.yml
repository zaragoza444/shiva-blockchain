services:
  onexd:
    build: .
    ports:
      - "8545:8545"
      - "30303:30303"
    volumes:
      - onex-data:/data
    environment:
      - ONEX_CORS_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8545/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  onexd-testnet:
    build: .
    profiles: ["testnet"]
    ports:
      - "8547:8547"
      - "30305:30305"
    command:
      - "-datadir"
      - "/data"
      - "-genesis"
      - "/app/configs/genesis-testnet.json"
      - "-api"
      - ":8547"
      - "-listen"
      - ":30305"
      - "-mine"
      - "-faucet"
      - "-miner"
      - "a1b2c3d4e5f6789012345678901234567890123456789012345678901234567890"
    volumes:
      - onex-testnet:/data
    environment:
      - ONEX_FAUCET_PRIVATE_KEY=${ONEX_FAUCET_PRIVATE_KEY:-}

  nginx:
    image: nginx:alpine
    profiles: ["proxy"]
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - onexd

volumes:
  onex-data:
  onex-testnet:
