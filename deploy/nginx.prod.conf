events { worker_connections 2048; }

http {
  upstream onex_node {
    server onexd:8545;
  }

  upstream onex_bridge {
    server onex-bridge:9338;
  }

  # HTTP — ACME renewal + redirect to HTTPS
  server {
    listen 80;
    server_name novatrustee.digital _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location /health {
      proxy_pass http://onex_bridge/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /wallet/ {
      return 301 https://$host$request_uri;
    }

    location /bridge/ {
      return 301 https://$host$request_uri;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name novatrustee.digital _;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /health {
      proxy_pass http://onex_bridge/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /wallet/ {
      proxy_pass http://onex_bridge/wallet/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /bridge/ {
      proxy_pass http://onex_bridge/bridge/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /rpc {
      proxy_pass http://onex_bridge;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /explorer/ {
      proxy_pass http://onex_node/explorer/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      proxy_pass http://onex_node;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
