name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./internal/...
      - run: go build -o bin/shivad ./cmd/shivad
      - run: go build -o bin/shiva ./cmd/shiva
      - run: go build -o bin/shiva-bridge ./cmd/shiva-bridge
      - run: go build -o bin/shiva-ai ./cmd/shiva-ai
      - run: go test ./internal/ai/...

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t shiva-blockchain:ci .
