name: Gitea Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync wallet static files
        run: |
          mkdir -p docs/wallet
          cp -r internal/bridge/static/wallet/* docs/wallet/
          BRIDGE="${{ vars.ONEX_BRIDGE_PUBLIC_URL }}"
          if [ -n "$BRIDGE" ]; then
            sed -i "s|window.__ONEX_BRIDGE_DEPLOY__ = .*|window.__ONEX_BRIDGE_DEPLOY__ = '${BRIDGE}';|" docs/wallet/config.js
          fi

      - name: Setup Pages
        uses: https://gitea.com/actions/configure-pages@v5

      - name: Upload artifact
        uses: https://gitea.com/actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to Gitea Pages
        uses: https://gitea.com/actions/deploy-pages@v4
