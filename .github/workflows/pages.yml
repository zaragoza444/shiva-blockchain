name: GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync wallet static files
        run: |
          mkdir -p docs/wallet
          cp -r internal/bridge/static/wallet/* docs/wallet/
          BRIDGE="${{ vars.SHIVA_BRIDGE_PUBLIC_URL }}"
          if [ -n "$BRIDGE" ]; then
            sed -i "s|window.__SHIVA_BRIDGE_DEPLOY__ = .*|window.__SHIVA_BRIDGE_DEPLOY__ = '${BRIDGE}';|" docs/wallet/config.js
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
