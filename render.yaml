# Deploy OneX node + wallet bridge on Render (free tier for testing).
# Dashboard → New → Blueprint → connect this repo.
# After deploy, set GitHub repo variable ONEX_BRIDGE_PUBLIC_URL to your bridge URL
# (e.g. https://onex-bridge.onrender.com) and re-run the Pages workflow.

services:
  - type: web
    name: onex-node
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "/usr/local/bin/onexd -datadir /var/data -api 0.0.0.0:$PORT -listen :30303 -seeds /app/configs/seeds-mainnet.json"
    healthCheckPath: /health
    disk:
      name: onex-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ONEX_CORS_ORIGINS
        value: https://zaragoza444.github.io

  - type: web
    name: onex-bridge
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "/usr/local/bin/onex-bridge -node $ONEX_NODE_URL -listen 0.0.0.0:$PORT -config /bridge-data/bridge.json -wallet /bridge-data/wallets/default.json"
    healthCheckPath: /health
    disk:
      name: bridge-data
      mountPath: /bridge-data
      sizeGB: 1
    envVars:
      - key: ONEX_NODE_URL
        fromService:
          type: web
          name: onex-node
          property: host
      - key: ONEX_CORS_ORIGINS
        value: https://zaragoza444.github.io
      - key: ONEX_PROJECT_ROOT
        value: /app
